name: EPL Broadcast

on:
  schedule:
    # 8 AM EAT = 5 AM UTC
    - cron: '0 5 * * *'
    # 8 PM EAT = 5 PM UTC
    - cron: '0 17 * * *'
    # 6 PM EAT = 3 PM UTC, before the evening World Cup kickoff block
    - cron: '0 15 * * *'
    # 11:30 PM EAT = 8:30 PM UTC, before the overnight World Cup kickoff block
    - cron: '30 20 * * *'
    # Every 10 minutes for reminders, results, commands, and news
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger
    inputs:
      command:
        description: 'Which telegram_broadcast.py command to run'
        required: true
        type: choice
        default: 'refresh'
        options:
          - 'refresh'
          - 'results'
          - 'live'
          - 'commands'
          - 'daily'
          - 'world-cup-analysis'
          - 'world-cup-analysis-review-reminder'
          - 'world-cup-analysis-publish'
          - 'world-cup-fact'
          - 'reminders'
          - 'news-fetch'

jobs:
  broadcast:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PY'
          import os
          import sys

          required = ["TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID", "TELEGRAM_ADMIN_ID", "SUPABASE_URL", "SUPABASE_KEY"]
          missing = [k for k in required if not (os.getenv(k) or "").strip()]
          if missing:
              print(f"Missing required secrets: {', '.join(missing)}")
              sys.exit(1)

          supabase_url = (os.getenv("SUPABASE_URL") or "").strip()
          if not supabase_url.startswith("https://"):
              print("SUPABASE_URL must start with https://")
              sys.exit(1)

          if "supabase.co" not in supabase_url:
              print("SUPABASE_URL looks unusual; expected a *.supabase.co URL.")
          print("Secrets validation passed.")
          PY

      - name: Notify Admin Workflow Started
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_ADMIN_ID"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_url = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          trigger = f"schedule {schedule}" if schedule else event_name
          text = (
              "▶️ Workflow Started\n\n"
              f"Run: #{run_number}\n"
              f"Trigger: {trigger}\n"
              f"Open run: {run_url}"
          )
          response = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=20,
          )
          if not response.ok:
              print(f"Telegram start notification failed: {response.status_code} {response.text}")
          PY

      - name: Refresh Fixtures
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'refresh' || github.event_name == 'schedule' && (github.event.schedule == '0 5 * * *' || github.event.schedule == '0 17 * * *')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          JSON_URL: ${{ secrets.JSON_URL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
        run: python3 telegram_broadcast.py refresh

      - name: Run World Cup Analysis
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'world-cup-analysis' || github.event_name == 'schedule' && (github.event.schedule == '0 15 * * *' || github.event.schedule == '30 20 * * *')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py world-cup-analysis

      - name: Remind Admin To Review World Cup Analysis
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'world-cup-analysis-review-reminder' || github.event_name == 'schedule' && (github.event.schedule == '0 15 * * *' || github.event.schedule == '30 20 * * *')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py world-cup-analysis-review-reminder

      - name: Process Telegram Commands
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'commands' || github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py commands

      - name: Run Daily Broadcast
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'daily' || github.event_name == 'schedule' && (github.event.schedule == '0 5 * * *' || github.event.schedule == '*/10 * * * *')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py daily

      - name: Publish Daily World Cup Fact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'world-cup-fact' || github.event_name == 'schedule' && github.event.schedule == '0 5 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py world-cup-fact

      - name: Run Reminders
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'reminders' || github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py reminders

      - name: Fetch News Queue
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'news-fetch' || github.event.name == 'schedule' && github.event.schedule == '*/10 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py news-fetch

      - name: Publish Approved World Cup Analysis
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'world-cup-analysis-publish' || github.event.name == 'schedule' && github.event.schedule == '*/10 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py world-cup-analysis-publish

      - name: Run Results
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'results' || github.event.name == 'schedule' && github.event.schedule == '*/10 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py results

      - name: Notify Admin Workflow Failed
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_ADMIN_ID"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_url = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          trigger = f"schedule {schedule}" if schedule else event_name
          text = (
              "⚠️ Workflow Failed\n\n"
              f"Run: #{run_number}\n"
              f"Trigger: {trigger}\n"
              f"Open run: {run_url}"
          )
          response = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=20,
          )
          if not response.ok:
              print(f"Telegram failure notification failed: {response.status_code} {response.text}")
          PY

      - name: Notify Admin Workflow Succeeded
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_ADMIN_ID"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_url = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          trigger = f"schedule {schedule}" if schedule else event_name
          text = (
              "✅ Workflow Finished\n\n"
              f"Run: #{run_number}\n"
              f"Trigger: {trigger}\n"
              f"Open run: {run_url}"
          )
          response = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=20,
          )
          if not response.ok:
              print(f"Telegram success notification failed: {response.status_code} {response.text}")
          PY
