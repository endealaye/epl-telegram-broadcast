name: EPL Broadcast

on:
  schedule:
    # 8 AM EAT = 5 AM UTC
    - cron: '0 5 * * *'
    # Every 30 minutes for reminders and results
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Daily Broadcast
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 telegram_broadcast.py daily

      - name: Run Reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 telegram_broadcast.py reminders

      - name: Run Results
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 telegram_broadcast.py results

      - name: Commit updated database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epl_2025.db
          git commit -m "Update match database [skip ci]" || echo "No changes to commit"
          git push
