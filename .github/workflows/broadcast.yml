name: EPL Broadcast

on:
  schedule:
    # 8 AM EAT = 5 AM UTC
    - cron: '0 5 * * *'
    # 8 PM EAT = 5 PM UTC
    - cron: '0 17 * * *'
    # Every 30 minutes for reminders and results
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  broadcast:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PY'
          import os
          import sys

          required = ["TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID", "TELEGRAM_ADMIN_ID", "SUPABASE_URL", "SUPABASE_KEY"]
          missing = [k for k in required if not (os.getenv(k) or "").strip()]
          if missing:
              print(f"Missing required secrets: {', '.join(missing)}")
              sys.exit(1)

          supabase_url = (os.getenv("SUPABASE_URL") or "").strip()
          if not supabase_url.startswith("https://"):
              print("SUPABASE_URL must start with https://")
              sys.exit(1)

          if "supabase.co" not in supabase_url:
              print("SUPABASE_URL looks unusual; expected a *.supabase.co URL.")
          print("Secrets validation passed.")
          PY

      - name: Notify Admin Workflow Started
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_ADMIN_ID"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_url = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          trigger = f"schedule {schedule}" if schedule else event_name
          text = (
              "▶️ Workflow Started\n\n"
              f"Run: #{run_number}\n"
              f"Trigger: {trigger}\n"
              f"Open run: {run_url}"
          )
          requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=20,
          ).raise_for_status()
          PY

      - name: Refresh Fixtures
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *' || github.event.schedule == '0 17 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py refresh

      - name: Process Telegram Commands
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py commands

      - name: Process Live Updates
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py live

      - name: Run Daily Broadcast
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py daily

      - name: Run Reminders
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py reminders

      - name: Fetch News Queue
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py news-fetch

      - name: Run Results
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 telegram_broadcast.py results

      - name: Notify Admin Workflow Failed
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_ADMIN_ID"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_url = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          trigger = f"schedule {schedule}" if schedule else event_name
          text = (
              "⚠️ Workflow Failed\n\n"
              f"Run: #{run_number}\n"
              f"Trigger: {trigger}\n"
              f"Open run: {run_url}"
          )
          requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=20,
          ).raise_for_status()
          PY

      - name: Notify Admin Workflow Succeeded
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_ADMIN_ID"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_url = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          trigger = f"schedule {schedule}" if schedule else event_name
          text = (
              "✅ Workflow Finished\n\n"
              f"Run: #{run_number}\n"
              f"Trigger: {trigger}\n"
              f"Open run: {run_url}"
          )
          requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=20,
          ).raise_for_status()
          PY
